# MVP production stack — run on a DigitalOcean Droplet.
# Usage (from deployments repo root):
#   docker compose --env-file do/.env -f do/docker-compose.prod.yml up -d --build

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-metricgraph}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in do/.env}
      POSTGRES_DB: ${POSTGRES_DB:-metricgraph}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-metricgraph}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../app/metricgraph/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://metricgraph:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-metricgraph}
      REDIS_URL: redis://redis:6379/0
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ../app/metricgraph/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      RUN_MIGRATIONS: "0"
      DATABASE_URL: postgresql+psycopg://metricgraph:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-metricgraph}
      REDIS_URL: redis://redis:6379/0
    command: ["python", "-m", "app.worker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    environment:
      API_DOMAIN: ${API_DOMAIN:-localhost}

volumes:
  pgdata:
  caddy_data:
  caddy_config:
