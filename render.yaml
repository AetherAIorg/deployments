# MVP — free-tier backend only (API + Postgres + Redis).
# Full stack: see render.full.yaml

services:
  - type: web
    name: margin-api
    runtime: docker
    plan: free
    dockerfilePath: ./app/metricgraph/backend/Dockerfile
    dockerContext: ./app/metricgraph/backend
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthCheckPath: /api/health
    preDeployCommand: alembic upgrade head
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: margin-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: margin-redis
          type: keyvalue
          property: connectionString
      - key: CORS_ORIGINS
        value: https://margin-app-karman103s-projects.vercel.app,http://localhost:3000
      - key: AUTH_SECRET
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_USE_SSL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false

  - type: keyvalue
    name: margin-redis
    plan: free
    ipAllowList: []

databases:
  - name: margin-postgres
    plan: free
